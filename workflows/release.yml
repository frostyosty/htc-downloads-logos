name: "Cross-Platform Tauri v2 Builder"

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            target_os: "windows"
          - platform: "ubuntu-22.04"
            target_os: "linux"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 'large'
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app-tauri-browser/package-lock.json

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'ubuntu-22.04' && 'x86_64-unknown-linux-gnu' || 'x86_64-pc-windows-msvc' }}

      - name: Rust Cache Setup
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./app-tauri-browser/src-tauri -> target"

      - name: Install Linux Dependencies (Ubuntu)
        if: matrix.target_os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            webkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build Desktop Application
        working-directory: ./app-tauri-browser
        env:
          # Prevent WebKit2 DMABUF/EGL issues in virtual runners
          WEBKIT_DISABLE_DMABUF_RENDERER: 1
          WEBKIT_DISABLE_COMPOSITING_MODE: 1
        run: |
          npm ci
          npm run tauri build

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-desktop-${{ matrix.target_os }}
          path: |
            app-tauri-browser/src-tauri/target/release/bundle/msi/*.msi
            app-tauri-browser/src-tauri/target/release/bundle/nsis/*.exe
            app-tauri-browser/src-tauri/target/release/bundle/deb/*.deb
            app-tauri-browser/src-tauri/target/release/bundle/appimage/*.AppImage

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app-tauri-browser/package-lock.json

      - name: Install Rust Stable and Android Targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android"

      - name: Rust Cache Setup (Android)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./app-tauri-browser/src-tauri -> target"

      - name: Build Android APK & AAB
        working-directory: ./app-tauri-browser
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          npm ci
          npm run tauri android build

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-android
          path: |
            app-tauri-browser/src-tauri/gen/android/app/build/outputs/apk/release/*.apk
            app-tauri-browser/src-tauri/gen/android/app/build/outputs/bundle/release/*.aab

  publish-release:
    needs: [build-desktop, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows & Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: ./release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release-artifacts/**/*.msi
            ./release-artifacts/**/*.exe
            ./release-artifacts/**/*.deb
            ./release-artifacts/**/*.AppImage
            ./release-artifacts/**/*.apk
            ./release-artifacts/**/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
